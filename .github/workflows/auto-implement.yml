name: Auto-Implement Issue

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  implement:
    if: github.event.label.name == 'auto-implement'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: React to issue
        run: |
          gh api -X POST /repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions \
            -f content='rocket' || true
          gh issue comment ${{ github.event.issue.number }} --repo ${{ github.repository }} \
            --body "Pipeline auto-implement iniciado. Acompanhe em [Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Implement issue
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-7
            --max-turns 40
            --allowedTools "Bash,Edit,MultiEdit,Write,Read,Grep,Glob,WebFetch,WebSearch,NotebookEdit"
          prompt: |
            Voce e um engenheiro autonomo trabalhando na issue #${{ github.event.issue.number }} do repo ${{ github.repository }}.

            ## Issue
            **Titulo**: ${{ github.event.issue.title }}
            **Reportado por**: ${{ github.event.issue.user.login }}

            **Corpo**:
            ${{ github.event.issue.body }}

            ## Sua missao
            1. **Investigar** o codigo afetado (provavelmente em `prism-os/`). Leia AGENTS.md e o CLAUDE.md do submodulo relevante antes de mexer.
            2. **Refinar como PO**: descreva no PR o problema real, hipotese de causa, e plano. Se a issue nao fizer sentido tecnico ou estiver mal especificada, abra PR draft com analise e recomende fechar/refinar (nao implemente as cegas).
            2b. **Early-exit em 15 turns sem causa raiz unica**: se apos ~15 turns voce ainda tem mais de uma hipotese plausivel e nao consegue decidir sem mais info (estado real do banco, exemplo concreto do reporter, screenshot), PARE. Abra PR draft com `[needs-refinement]` no titulo contendo: as hipoteses identificadas, qual info falta, e pergunta especifica pro reporter. Aplique label `needs-refinement`. NAO especule fix. Melhor PR de diagnostico em 15 turns do que estourar 40 sem chegar a lugar nenhum.
            3. **Implementar** a correcao. Pequeno escopo. Nao refatore alem do necessario.
            4. **Testar** localmente o que conseguir (sintaxe Python, import check). Nao tem suite formal de testes.
            5. **Abrir PR draft** contra `master` com:
               - Branch: `auto/issue-${{ github.event.issue.number }}-<slug-curto>`
               - Titulo: `fix(prism-os): <descricao curta> (closes #${{ github.event.issue.number }})`
               - Body: contexto da issue, causa raiz, mudanca aplicada, como testar, riscos
               - Label `auto-implement` no PR (pra disparar review depois)
               - Marque como DRAFT (nao ready for review)
            6. **NAO mergeie**. PR vai pra review automatica em pipeline separado.

            ## Regras nao-negociaveis
            - NUNCA commit em master direto. Sempre branch + PR.
            - NUNCA mexa em `.github/workflows/` (esses arquivos sao protegidos).
            - NUNCA exponha secrets, API keys, ou tokens em logs/codigo.
            - Commits no formato `fix(prism-os): ...` ou `feat(prism-os): ...`.
            - Mensagem de commit em portugues, sem emojis, sem travessao (use `:` ou `-`).
            - Co-author: `Co-Authored-By: Claude <noreply@anthropic.com>`.

            ## Contexto do projeto
            PRISM OS e o sistema de producao de conteudo do canal Frota Para Todos (Julio Cesar). Python + dashboard local. Subpastas:
            - `prism-os/nutella-creator/` (pipeline live -> cortes/thumbs/blog)
            - `prism-os/thumbnail-ai-creator/` (geracao thumbnail standalone)

            Use bash, leitura de arquivos, edicao, e git. Ao final, comente na issue com o link do PR.
