<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Portal FPT</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
  <style>
/* Busca e filtros */
.admin-filters { display:flex; gap:12px; margin-bottom:20px; flex-wrap:wrap; }
.admin-filters input, .admin-filters select {
  padding:8px 12px; border-radius:6px; border:1px solid #2d2044;
  background:#1a0d2e; color:#F7F7F7; font-size:14px; flex:1; min-width:160px;
}
/* Modal de edição */
.edit-modal-overlay {
  display:none; position:fixed; inset:0; background:rgba(0,0,0,.7);
  z-index:1000; align-items:center; justify-content:center;
}
.edit-modal-overlay.open { display:flex; }
.edit-modal {
  background:#1a0d2e; border:1px solid #2d2044; border-radius:12px;
  padding:28px; width:90%; max-width:700px; max-height:85vh; overflow-y:auto;
}
.edit-modal h3 { margin:0 0 20px; color:#F7F7F7; font-size:18px; }
.edit-modal label { display:block; color:#94A3B8; font-size:13px; margin-bottom:4px; }
.edit-modal input, .edit-modal select, .edit-modal textarea {
  width:100%; box-sizing:border-box; padding:9px 12px; border-radius:6px;
  border:1px solid #2d2044; background:#0d0020; color:#F7F7F7;
  font-size:14px; margin-bottom:14px;
}
.edit-modal textarea { min-height:120px; font-family:monospace; resize:vertical; }
.edit-modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:6px; }
.btn-edit { background:#2d2044; color:#F7F7F7; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:13px; }
.btn-edit:hover { background:#8B23E5; }
.btn-save { background:#8B23E5; color:#fff; border:none; padding:9px 20px; border-radius:6px; cursor:pointer; font-weight:600; }
.btn-cancel-edit { background:transparent; color:#94A3B8; border:1px solid #2d2044; padding:9px 20px; border-radius:6px; cursor:pointer; }
  </style>
</head>
<body>

<header class="header">
  <a href="/" class="header-logo">Frota Para <span>Todos</span> <small style="font-size:12px;color:#94A3B8;font-weight:400"> · Admin</small></a>
  <nav class="header-nav"><a href="/">Ver portal</a></nav>
</header>

<main class="container">
  <div class="admin">
    <h1>Painel de Curadoria</h1>
    <p class="admin-subtitle">Revise e aprove os posts gerados pelo PRISM OS antes de publicar.</p>

    <div class="admin-key-bar">
      <input type="password" id="api-key-input" placeholder="API Key" />
      <button class="btn" onclick="loadAdmin()">Entrar</button>
      <button class="btn" id="sync-btn" onclick="syncYouTube()" style="display:none;background:rgba(139,35,229,0.2);border:1px solid rgba(139,35,229,0.4);">↻ Sincronizar YouTube</button>
    </div>
    <p id="sync-msg" style="display:none;font-size:13px;margin-bottom:16px;"></p>

    <div id="admin-content" style="display:none">
      <!-- Tabs -->
      <div style="display:flex;gap:4px;margin-bottom:32px;border-bottom:1px solid rgba(139,35,229,0.2);padding-bottom:0;">
        <button class="tab-btn active" onclick="switchTab('posts')" id="tab-posts"
          style="padding:10px 20px;background:transparent;border:none;border-bottom:2px solid #8B23E5;color:#F7F7F7;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:-1px;">
          Posts
        </button>
        <button class="tab-btn" onclick="switchTab('comments')" id="tab-comments"
          style="padding:10px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:#94A3B8;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:-1px;">
          Comentários <span id="pending-comments-badge" style="display:none;background:#8B23E5;color:#fff;border-radius:10px;padding:1px 7px;font-size:11px;margin-left:4px;"></span>
        </button>
        <button class="tab-btn" onclick="switchTab('newsletter')" id="tab-newsletter"
          style="padding:10px 20px;background:transparent;border:none;border-bottom:2px solid transparent;color:#94A3B8;font-family:'Montserrat',sans-serif;font-size:14px;font-weight:600;cursor:pointer;margin-bottom:-1px;">
          Newsletter
        </button>
      </div>

      <!-- Posts Tab -->
      <div id="posts-tab">
        <div class="admin-filters">
          <input type="text" id="searchFilter" placeholder="Buscar por título..." oninput="filterPosts()" />
          <select id="categoryFilter" onchange="filterPosts()">
            <option value="">Todas as categorias</option>
            <option value="videos">Vídeos</option>
            <option value="entrevistas">Entrevistas</option>
            <option value="artigos">Artigos</option>
            <option value="noticias">Notícias</option>
          </select>
          <select id="statusFilter" onchange="filterPosts()">
            <option value="">Todos os status</option>
            <option value="pending">Pendente</option>
            <option value="published">Publicado</option>
            <option value="rejected">Rejeitado</option>
          </select>
        </div>

        <div id="pending-section">
          <div class="section-title">Aguardando revisão</div>
          <div id="pending-list"></div>
        </div>

        <div id="published-section" style="margin-top:40px">
          <div class="section-title">Publicados</div>
          <div id="published-list"></div>
        </div>
      </div>

      <!-- Newsletter Tab -->
      <div id="newsletter-tab" style="display:none">
        <div id="newsletter-stats" style="display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap;"></div>
        <div class="section-title">Inscritos ativos</div>
        <div id="subscribers-list"></div>
      </div>

      <!-- Comments Tab -->
      <div id="comments-tab" style="display:none">
        <div id="pending-comments-section">
          <div class="section-title">Comentários aguardando moderação</div>
          <div id="pending-comments-list"></div>
        </div>

        <div id="approved-comments-section" style="margin-top:40px">
          <div class="section-title">Comentários aprovados</div>
          <div id="approved-comments-list"></div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Modal de edição -->
<div class="edit-modal-overlay" id="editModalOverlay">
  <div class="edit-modal">
    <h3>Editar Post</h3>
    <label>Título</label>
    <input type="text" id="editTitle" placeholder="Título do post" />
    <label>Categoria</label>
    <select id="editCategory">
      <option value="videos">Vídeos</option>
      <option value="entrevistas">Entrevistas</option>
      <option value="artigos">Artigos</option>
      <option value="noticias">Notícias</option>
    </select>
    <label>Excerpt (resumo)</label>
    <input type="text" id="editExcerpt" placeholder="Resumo curto..." />
    <label>Conteúdo HTML</label>
    <textarea id="editContentHtml" placeholder="<p>Conteúdo...</p>"></textarea>
    <div class="edit-modal-actions">
      <button class="btn-cancel-edit" onclick="closeEditModal()">Cancelar</button>
      <button class="btn-save" onclick="saveEdit()">Salvar</button>
    </div>
  </div>
</div>

<script>
  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }

  let currentKey = '';

  function getKey() { return document.getElementById('api-key-input').value; }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function switchTab(tab) {
    ['posts', 'comments', 'newsletter'].forEach(t => {
      document.getElementById(`${t}-tab`).style.display = t === tab ? 'block' : 'none';
      document.getElementById(`tab-${t}`).style.borderBottomColor = t === tab ? '#8B23E5' : 'transparent';
      document.getElementById(`tab-${t}`).style.color = t === tab ? '#F7F7F7' : '#94A3B8';
    });
    if (tab === 'newsletter') loadNewsletter();
  }

  async function loadAdmin() {
    const key = getKey();
    if (!key) return alert('Digite a API Key');
    currentKey = key;
    try {
      const [posts, comments] = await Promise.all([
        fetch('/api/admin/posts', { headers: { 'x-api-key': key } }).then(r => {
          if (r.status === 401) throw new Error('API Key inválida');
          return r.json();
        }),
        fetch('/api/admin/comments', { headers: { 'x-api-key': key } }).then(r => r.json())
      ]);
      document.getElementById('admin-content').style.display = 'block';
      document.getElementById('sync-btn').style.display = 'inline-flex';
      window.allPosts = posts;
      renderPosts(posts, key);
      renderComments(comments, key);
    } catch (e) {
      alert(e.message);
    }
  }

  function renderPosts(posts, key) {
    const _key = key || currentKey;
    const pending = posts.filter(p => p.status === 'pending');
    const published = posts.filter(p => p.status !== 'pending');

    document.getElementById('pending-list').innerHTML = pending.length
      ? pending.map(p => renderPostItem(p, _key, true)).join('')
      : '<div class="empty-state">Nenhum post aguardando revisão.</div>';

    document.getElementById('published-list').innerHTML = published.length
      ? published.map(p => renderPostItem(p, _key, false)).join('')
      : '<div class="empty-state">Nenhum post publicado ainda.</div>';
  }

  function renderComments(comments, key) {
    const pending = comments.filter(c => c.status === 'pending');
    const approved = comments.filter(c => c.status === 'approved');

    const badge = document.getElementById('pending-comments-badge');
    if (pending.length) {
      badge.style.display = 'inline';
      badge.textContent = pending.length;
    }

    document.getElementById('pending-comments-list').innerHTML = pending.length
      ? pending.map(c => renderCommentItem(c, key, true)).join('')
      : '<div class="empty-state">Nenhum comentário aguardando moderação.</div>';

    document.getElementById('approved-comments-list').innerHTML = approved.length
      ? approved.map(c => renderCommentItem(c, key, false)).join('')
      : '<div class="empty-state">Nenhum comentário aprovado ainda.</div>';
  }

  function renderPostItem(post, key, showActions) {
    const actions = showActions ? `
      <div class="post-item-actions">
        <button class="btn-edit" data-post-id="${post.id}" onclick="openEditModalById(this.dataset.postId)">Editar</button>
        <button class="btn btn-approve" onclick="approvePost(${post.id})">✓ Aprovar</button>
        <button class="btn btn-reject" onclick="rejectPost(${post.id})">✕ Rejeitar</button>
        <button class="btn btn-reject" onclick="deletePost(${post.id})" title="Excluir permanentemente" style="background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4);">🗑</button>
      </div>` : `
      <div class="post-item-actions">
        <button class="btn-edit" data-post-id="${post.id}" onclick="openEditModalById(this.dataset.postId)">Editar</button>
        <a href="/post/${post.slug}" target="_blank" class="btn" style="font-size:12px;padding:6px 12px">Ver →</a>
        <button class="btn btn-reject" onclick="deletePost(${post.id})" title="Excluir permanentemente" style="background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4);">🗑</button>
      </div>`;

    return `
      <div class="post-item" id="post-${post.id}">
        <div class="post-item-info">
          <div class="post-item-title">${escapeHtml(post.title)}</div>
          <div class="post-item-meta">${formatDate(post.created_at)} · ${escapeHtml(post.category)}${post.video_id ? ' · ▶ com vídeo' : ''}</div>
          ${post.excerpt ? `<div style="font-size:13px;color:#94A3B8;margin-top:6px">${escapeHtml((post.excerpt || '').substring(0, 120))}...</div>` : ''}
        </div>
        ${actions}
      </div>`;
  }

  function renderCommentItem(comment, key, showActions) {
    const actions = showActions ? `
      <div class="post-item-actions">
        <button class="btn btn-approve" onclick="approveComment(${comment.id})">✓ Aprovar</button>
        <button class="btn btn-reject" onclick="rejectComment(${comment.id})">✕ Rejeitar</button>
      </div>` : `
      <div class="post-item-actions">
        <a href="/post/${comment.post_slug}" target="_blank" class="btn" style="font-size:12px;padding:6px 12px">Ver post →</a>
      </div>`;

    return `
      <div class="post-item" id="comment-${comment.id}">
        <div class="post-item-info">
          <div class="post-item-title">${escapeHtml(comment.author)} <span style="font-weight:400;color:#94A3B8;font-size:13px;">em /${comment.post_slug}</span></div>
          <div class="post-item-meta">${formatDate(comment.created_at)}</div>
          <div style="font-size:13px;color:#d4c8e8;margin-top:6px">${escapeHtml((comment.content || '').substring(0, 200))}${comment.content.length > 200 ? '...' : ''}</div>
        </div>
        ${actions}
      </div>`;
  }

  async function approvePost(id) {
    await fetch(`/api/admin/posts/${id}/publish`, { method: 'PUT', headers: { 'x-api-key': currentKey } });
    loadAdmin();
  }

  async function rejectPost(id) {
    if (!confirm('Rejeitar este post?')) return;
    await fetch(`/api/admin/posts/${id}/reject`, { method: 'PUT', headers: { 'x-api-key': currentKey } });
    loadAdmin();
  }

  async function deletePost(id) {
    if (!confirm('Excluir permanentemente este post? Essa ação não pode ser desfeita.')) return;
    const r = await fetch(`/api/admin/posts/${id}`, { method: 'DELETE', headers: { 'x-api-key': currentKey } });
    if (r.ok) loadAdmin();
    else alert('Erro ao excluir post');
  }

  async function loadNewsletter() {
    const statsEl = document.getElementById('newsletter-stats');
    const listEl = document.getElementById('subscribers-list');
    statsEl.innerHTML = '<div style="color:#94A3B8;font-size:13px;">Carregando...</div>';
    try {
      const data = await fetch('/api/admin/subscribers', { headers: { 'x-api-key': currentKey } }).then(r => r.json());
      statsEl.innerHTML = `
        <div style="background:#1a0d2e;border:1px solid #2d2044;border-radius:10px;padding:16px 24px;flex:1;min-width:140px;">
          <div style="font-size:28px;font-weight:800;color:#F7F7F7;">${data.total}</div>
          <div style="font-size:12px;color:#94A3B8;margin-top:4px;">Total inscritos</div>
        </div>
        <div style="background:#1a0d2e;border:1px solid rgba(34,197,94,.3);border-radius:10px;padding:16px 24px;flex:1;min-width:140px;">
          <div style="font-size:28px;font-weight:800;color:#22C55E;">${data.confirmed}</div>
          <div style="font-size:12px;color:#94A3B8;margin-top:4px;">Confirmados (recebem newsletter)</div>
        </div>
        <div style="background:#1a0d2e;border:1px solid rgba(250,204,21,.3);border-radius:10px;padding:16px 24px;flex:1;min-width:140px;">
          <div style="font-size:28px;font-weight:800;color:#FACC15;">${data.pending}</div>
          <div style="font-size:12px;color:#94A3B8;margin-top:4px;">Aguardando confirmação</div>
        </div>`;
      listEl.innerHTML = data.subscribers.length
        ? data.subscribers.map(s => `
            <div class="post-item">
              <div class="post-item-info">
                <div class="post-item-title">${escapeHtml(s.email)}</div>
                <div class="post-item-meta">
                  Inscrito em ${formatDate(s.created_at)} ·
                  <span style="color:${s.confirmed ? '#22C55E' : '#FACC15'}">
                    ${s.confirmed ? '✓ Confirmado' : '⏳ Aguardando confirmação'}
                  </span>
                </div>
              </div>
            </div>`).join('')
        : '<div class="empty-state">Nenhum inscrito ainda.</div>';
    } catch (e) {
      statsEl.innerHTML = '<div style="color:#ef4444;">Erro ao carregar inscritos.</div>';
    }
  }

  async function approveComment(id) {
    await fetch(`/api/admin/comments/${id}/approve`, { method: 'PUT', headers: { 'x-api-key': currentKey } });
    loadAdmin();
  }

  async function rejectComment(id) {
    if (!confirm('Rejeitar este comentário?')) return;
    await fetch(`/api/admin/comments/${id}/reject`, { method: 'PUT', headers: { 'x-api-key': currentKey } });
    loadAdmin();
  }

  document.getElementById('api-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadAdmin();
  });

  async function syncYouTube() {
    const btn = document.getElementById('sync-btn');
    const msg = document.getElementById('sync-msg');
    btn.disabled = true;
    btn.textContent = '↻ Sincronizando...';
    msg.style.display = 'none';
    try {
      const r = await fetch('/api/admin/sync-youtube', { method: 'POST', headers: { 'x-api-key': currentKey } });
      const data = await r.json();
      msg.style.display = 'block';
      if (data.erro) {
        msg.style.color = '#ef4444';
        msg.textContent = 'Erro: ' + data.erro;
      } else {
        msg.style.color = '#22C55E';
        msg.textContent = data.criados > 0
          ? `✓ ${data.criados} novo(s) vídeo(s) importado(s) — aprove abaixo`
          : '✓ Nenhum vídeo novo no canal';
        if (data.criados > 0) loadAdmin();
      }
    } catch (e) {
      msg.style.display = 'block';
      msg.style.color = '#ef4444';
      msg.textContent = 'Erro ao sincronizar';
    }
    btn.disabled = false;
    btn.textContent = '↻ Sincronizar YouTube';
  }

  window.addEventListener('scroll', () => {
    document.querySelector('.header').classList.toggle('header--scrolled', window.scrollY > 10);
  }, { passive: true });

  // --- Edição de posts ---
  let editingPostId = null;

  function openEditModal(post) {
    editingPostId = post.id;
    document.getElementById('editTitle').value = post.title || '';
    document.getElementById('editCategory').value = post.category || 'videos';
    document.getElementById('editExcerpt').value = post.excerpt || '';
    document.getElementById('editContentHtml').value = post.content_html || '';
    document.getElementById('editModalOverlay').classList.add('open');
  }

  function openEditModalById(postId) {
    const post = (window.allPosts || []).find(p => p.id == postId);
    if (post) openEditModal(post);
  }

  function closeEditModal() {
    document.getElementById('editModalOverlay').classList.remove('open');
    editingPostId = null;
  }

  async function saveEdit() {
    const title = document.getElementById('editTitle').value.trim();
    const category = document.getElementById('editCategory').value;
    const excerpt = document.getElementById('editExcerpt').value.trim();
    const content_html = document.getElementById('editContentHtml').value.trim();
    if (!title || !content_html) return alert('Título e conteúdo são obrigatórios');
    const r = await fetch(`/api/admin/posts/${editingPostId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'x-api-key': currentKey },
      body: JSON.stringify({ title, excerpt, content_html, category })
    });
    if (r.ok) { closeEditModal(); loadAdmin(); }
    else alert('Erro ao salvar');
  }

  // --- Filtro de posts ---
  function filterPosts() {
    const search = (document.getElementById('searchFilter').value || '').toLowerCase();
    const category = document.getElementById('categoryFilter').value;
    const status = document.getElementById('statusFilter').value;
    const filtered = (window.allPosts || []).filter(p => {
      const matchSearch = !search || (p.title || '').toLowerCase().includes(search);
      const matchCat = !category || p.category === category;
      const matchStatus = !status || p.status === status;
      return matchSearch && matchCat && matchStatus;
    });
    renderPosts(filtered);
  }
</script>
</body>
</html>
