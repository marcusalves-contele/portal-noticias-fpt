<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Portal FPT</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="header-logo">Frota Para <span>Todos</span> <small style="font-size:12px;color:#94A3B8;font-weight:400"> · Admin</small></a>
  <nav class="header-nav"><a href="/">Ver portal</a></nav>
</header>

<main class="container">
  <div class="admin">
    <h1>Painel de Curadoria</h1>
    <p class="admin-subtitle">Revise e aprove os posts gerados pelo PRISM OS antes de publicar.</p>

    <div class="admin-key-bar">
      <input type="password" id="api-key-input" placeholder="API Key" />
      <button class="btn" onclick="loadAdmin()">Entrar</button>
    </div>

    <div id="pending-section" style="display:none">
      <div class="section-title">Aguardando revisão</div>
      <div id="pending-list"></div>
    </div>

    <div id="published-section" style="display:none;margin-top:40px">
      <div class="section-title">Publicados</div>
      <div id="published-list"></div>
    </div>
  </div>
</main>

<script>
  function getKey() { return document.getElementById('api-key-input').value; }

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  async function loadAdmin() {
    const key = getKey();
    if (!key) return alert('Digite a API Key');
    try {
      const posts = await fetch('/api/admin/posts', {
        headers: { 'x-api-key': key }
      }).then(r => {
        if (r.status === 401) throw new Error('API Key inválida');
        return r.json();
      });
      renderAdmin(posts, key);
    } catch (e) {
      alert(e.message);
    }
  }

  function renderAdmin(posts, key) {
    document.getElementById('pending-section').style.display = 'block';
    document.getElementById('published-section').style.display = 'block';

    const pending = posts.filter(p => p.status === 'pending');
    const published = posts.filter(p => p.status === 'published');

    document.getElementById('pending-list').innerHTML = pending.length
      ? pending.map(p => renderPostItem(p, key, true)).join('')
      : '<div class="empty-state">Nenhum post aguardando revisão.</div>';

    document.getElementById('published-list').innerHTML = published.length
      ? published.map(p => renderPostItem(p, key, false)).join('')
      : '<div class="empty-state">Nenhum post publicado ainda.</div>';
  }

  function renderPostItem(post, key, showActions) {
    const actions = showActions ? `
      <div class="post-item-actions">
        <button class="btn btn-approve" onclick="approve(${post.id}, '${key}')">✓ Aprovar</button>
        <button class="btn btn-reject" onclick="reject(${post.id}, '${key}')">✕ Rejeitar</button>
      </div>` : `
      <div class="post-item-actions">
        <a href="/post/${post.slug}" target="_blank" class="btn" style="font-size:12px;padding:6px 12px">Ver →</a>
      </div>`;

    return `
      <div class="post-item" id="post-${post.id}">
        <div class="post-item-info">
          <div class="post-item-title">${post.title}</div>
          <div class="post-item-meta">${formatDate(post.created_at)} · ${post.category}${post.video_id ? ' · ▶ com vídeo' : ''}</div>
          ${post.excerpt ? `<div style="font-size:13px;color:#94A3B8;margin-top:6px">${post.excerpt.substring(0, 120)}...</div>` : ''}
        </div>
        ${actions}
      </div>`;
  }

  async function approve(id, key) {
    await fetch(`/api/admin/posts/${id}/publish`, { method: 'PUT', headers: { 'x-api-key': key } });
    loadAdmin();
  }

  async function reject(id, key) {
    if (!confirm('Rejeitar este post?')) return;
    await fetch(`/api/admin/posts/${id}/reject`, { method: 'PUT', headers: { 'x-api-key': key } });
    loadAdmin();
  }

  document.getElementById('api-key-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadAdmin();
  });
</script>
</body>
</html>
