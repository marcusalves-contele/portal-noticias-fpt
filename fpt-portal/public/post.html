<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Frota Para Todos" id="og-title">
  <meta property="og:description" content="Referência editorial em gestão de frotas." id="og-description">
  <meta property="og:image" content="" id="og-image">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="Frota Para Todos">
  <meta name="description" content="" id="meta-description">
  <script type="application/ld+json" id="article-jsonld"></script>
  <title>Artigo — Frota Para Todos</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="header">
  <a href="/" class="header-logo">Frota Para <span>Todos</span></a>
  <nav class="header-nav">
    <a href="/">Início</a>
    <a href="/?category=noticias">Notícias</a>
    <a href="/?category=videos">Vídeos</a>
  </nav>
  <button class="hamburger" id="hamburger" aria-label="Menu" onclick="toggleMobileNav()">
    <span></span><span></span><span></span>
  </button>
</header>

<div class="mobile-nav" id="mobile-nav">
  <button class="mobile-nav-close" onclick="toggleMobileNav()">✕</button>
  <a href="/">Início</a>
  <a href="/?category=noticias">Notícias</a>
  <a href="/?category=videos">Vídeos</a>
</div>

<div id="article-hero"></div>

<main>
  <article id="article" class="article">
    <div class="loading">Carregando artigo...</div>
  </article>

  <div id="comments-section" class="article" style="display:none">
    <div class="comments-section">
      <h2>Comentários</h2>
      <div id="comments-list"></div>

      <div class="comment-form">
        <h3>Deixe seu comentário</h3>
        <form id="comment-form" onsubmit="submitComment(event)">
          <input type="text" id="c-author" placeholder="Seu nome" required maxlength="100">
          <textarea id="c-content" placeholder="Escreva seu comentário..." rows="4" required maxlength="2000"></textarea>
          <button type="submit" id="c-btn" class="btn">Enviar comentário</button>
        </form>
        <p id="c-msg" style="display:none;margin-top:12px;font-size:14px;"></p>
      </div>
    </div>
  </div>

  <div id="related-section" class="article" style="display:none">
    <div class="related-wrap">
      <h3 class="related-title">Continue lendo</h3>
      <div id="related-grid" class="related-grid"></div>
    </div>
  </div>
</main>

<footer class="footer">
  <p>© 2026 Frota Para Todos · Julio César</p>
</footer>

<script>
  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  const CATEGORY_LABELS = {
    noticias: 'Notícias', analises: 'Análises',
    entrevistas: 'Entrevistas', casos: 'Casos', videos: 'Vídeos'
  };

  function formatDate(iso) {
    return new Date(iso).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
  }

  function readingTime(html) {
    const text = html.replace(/<[^>]+>/g, ' ');
    const words = text.trim().split(/\s+/).length;
    return Math.max(1, Math.ceil(words / 200));
  }

  async function loadPost() {
    const slug = location.pathname.replace('/post/', '');
    const article = document.getElementById('article');
    try {
      const post = await fetch(`/api/posts/${slug}`).then(r => {
        if (!r.ok) throw new Error('not found');
        return r.json();
      });
      document.title = `${post.title} — Frota Para Todos`;
      const heroImgFull = post.image_url || (post.video_id ? `https://img.youtube.com/vi/${post.video_id}/maxresdefault.jpg` : '');
      document.getElementById('og-title').setAttribute('content', post.title + ' — Frota Para Todos');
      document.getElementById('og-description').setAttribute('content', post.excerpt || 'Referência editorial em gestão de frotas.');
      if (heroImgFull) document.getElementById('og-image').setAttribute('content', heroImgFull);
      document.getElementById('meta-description').setAttribute('content', post.excerpt || '');
      document.getElementById('article-jsonld').textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@type": "Article",
        "headline": post.title,
        "description": post.excerpt || '',
        "image": heroImgFull || '',
        "datePublished": post.published_at,
        "author": { "@type": "Person", "name": "Julio César" },
        "publisher": { "@type": "Organization", "name": "Frota Para Todos", "url": location.origin },
        "mainEntityOfPage": { "@type": "WebPage", "@id": location.href }
      });

      const videoEmbed = post.video_id
        ? `<div class="video-embed">
             <iframe src="https://www.youtube.com/embed/${post.video_id}"
               allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
               allowfullscreen></iframe>
           </div>`
        : '';

      const heroImg = post.image_url || (post.video_id ? `https://img.youtube.com/vi/${post.video_id}/maxresdefault.jpg` : '');

      if (heroImg) {
        document.getElementById('article-hero').innerHTML = `
          <div class="article-hero">
            <img src="${esc(heroImg)}" alt="${esc(post.title)}">
            <div class="article-hero-overlay"></div>
            <div class="article-hero-content">
              <span class="badge" data-cat="${esc(post.category)}">${CATEGORY_LABELS[post.category] || esc(post.category)}</span>
              <h1>${esc(post.title)}</h1>
              <div class="article-meta">
                <time>${formatDate(post.published_at)}</time> · ${readingTime(post.content_html)} min de leitura · Julio César | Frota Para Todos
              </div>
            </div>
          </div>`;

        article.innerHTML = `
          <a href="/" class="back-link">← Voltar para o portal</a>
          ${videoEmbed}
          <div class="article-content">${post.content_html}</div>`;
      } else {
        document.getElementById('article-hero').innerHTML = '';
        article.innerHTML = `
          <a href="/" class="back-link">← Voltar para o portal</a>
          <div class="article-header">
            <span class="badge" data-cat="${esc(post.category)}">${CATEGORY_LABELS[post.category] || esc(post.category)}</span>
            <h1 class="article-title">${esc(post.title)}</h1>
            <div class="article-meta">
              <time>${formatDate(post.published_at)}</time> · ${readingTime(post.content_html)} min de leitura · Julio César | Frota Para Todos
            </div>
          </div>
          ${videoEmbed}
          <div class="article-content">${post.content_html}</div>`;
      }

      await loadComments(slug);
      await loadRelated(slug);
    } catch (e) {
      article.innerHTML = `
        <a href="/" class="back-link">← Voltar para o portal</a>
        <div class="empty-state">Artigo não encontrado.</div>`;
    }
  }

  async function loadComments(slug) {
    const section = document.getElementById('comments-section');
    try {
      const comments = await fetch(`/api/comments/${slug}`).then(r => r.json());
      const list = document.getElementById('comments-list');
      list.innerHTML = comments.length
        ? comments.map(c => `
            <div class="comment">
              <div class="comment-header">
                <div class="comment-avatar">${c.author.charAt(0).toUpperCase()}</div>
                <span class="comment-author">${c.author}</span>
                <span class="comment-date">${formatDate(c.created_at)}</span>
              </div>
              <div class="comment-content">${c.content.replace(/</g, '&lt;')}</div>
            </div>`).join('')
        : '<p style="color:#94A3B8;font-size:14px;">Seja o primeiro a comentar!</p>';
    } catch (e) {}
    section.style.display = 'block';
  }

  async function loadRelated(slug) {
    try {
      const posts = await fetch(`/api/posts/related/${slug}`).then(r => r.json());
      if (!posts.length) return;
      const grid = document.getElementById('related-grid');
      const CATS = { noticias: 'Notícias', analises: 'Análises', entrevistas: 'Entrevistas', casos: 'Casos', videos: 'Vídeos' };
      grid.innerHTML = posts.map(p => {
        const img = p.image_url || (p.video_id ? `https://img.youtube.com/vi/${p.video_id}/maxresdefault.jpg` : '');
        const date = new Date(p.published_at).toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
        return `
        <article class="related-card" onclick="location.href='/post/${p.slug}'">
          ${img ? `<img class="related-card-img" src="${esc(img)}" alt="${esc(p.title)}" loading="lazy">` : '<div class="related-card-img related-card-placeholder"></div>'}
          <div class="related-card-body">
            <span class="badge" data-cat="${esc(p.category)}">${CATS[p.category] || esc(p.category)}</span>
            <h4 class="related-card-title">${esc(p.title)}</h4>
            <time class="card-date">${date}</time>
          </div>
        </article>`;
      }).join('');
      document.getElementById('related-section').style.display = 'block';
    } catch (e) {}
  }

  async function submitComment(e) {
    e.preventDefault();
    const slug = location.pathname.replace('/post/', '');
    const author = document.getElementById('c-author').value.trim();
    const content = document.getElementById('c-content').value.trim();
    const msg = document.getElementById('c-msg');
    const btn = document.getElementById('c-btn');
    btn.disabled = true;
    btn.textContent = 'Enviando...';
    try {
      const r = await fetch('/api/comments', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ post_slug: slug, author, content })
      });
      msg.style.display = 'block';
      if (r.ok) {
        msg.style.color = '#22C55E';
        msg.textContent = '✓ Comentário enviado! Aguarda aprovação antes de aparecer.';
        document.getElementById('comment-form').reset();
      } else {
        const data = await r.json();
        msg.style.color = '#ef4444';
        msg.textContent = data.error || 'Erro ao enviar.';
      }
    } catch (e) {
      msg.style.display = 'block';
      msg.style.color = '#ef4444';
      msg.textContent = 'Erro ao enviar. Tente novamente.';
    }
    btn.disabled = false;
    btn.textContent = 'Enviar comentário';
  }

  window.addEventListener('scroll', () => {
    const doc = document.documentElement;
    const scrolled = doc.scrollTop / (doc.scrollHeight - doc.clientHeight);
    document.getElementById('reading-progress').style.width = (scrolled * 100) + '%';
    document.getElementById('back-to-top').classList.toggle('visible', window.scrollY > 400);
    document.querySelector('.header').classList.toggle('header--scrolled', window.scrollY > 10);
  }, { passive: true });

  function toggleMobileNav() {
    const nav = document.getElementById('mobile-nav');
    const btn = document.getElementById('hamburger');
    nav.classList.toggle('open');
    btn.classList.toggle('open');
    document.body.style.overflow = nav.classList.contains('open') ? 'hidden' : '';
  }

  loadPost();
</script>

<div id="reading-progress"></div>
<button id="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
</body>
</html>
